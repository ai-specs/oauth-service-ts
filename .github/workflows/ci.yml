        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: oauth-service-ts/coverage
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: oauth-service-ts/package-lock.json

      - name: Install dependencies
        working-directory: oauth-service-ts
        run: npm ci

      - name: Run npm audit
        working-directory: oauth-service-ts
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: oauth-service-ts/package-lock.json

      - name: Install dependencies
        working-directory: oauth-service-ts
        run: npm ci

      - name: Generate Prisma Client
        working-directory: oauth-service-ts
        run: npm run prisma:generate

      - name: TypeScript type check
        working-directory: oauth-service-ts
        run: npx tsc --noEmit