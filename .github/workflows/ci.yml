name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: oauth-service-ts/package-lock.json

      - name: Install dependencies
        working-directory: oauth-service-ts
        run: npm ci

      - name: Run ESLint
        working-directory: oauth-service-ts
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: oauth-service-ts/package-lock.json

      - name: Install dependencies
        working-directory: oauth-service-ts
        run: npm ci

      - name: Generate Prisma Client
        working-directory: oauth-service-ts
        run: npm run prisma:generate

      - name: Build TypeScript
        working-directory: oauth-service-ts
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: oauth-service-ts/dist
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: oauth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: oauth-service-ts/package-lock.json

      - name: Install dependencies
        working-directory: oauth-service-ts
        run: npm ci

      - name: Generate Prisma Client
        working-directory: oauth-service-ts
        run: npm run prisma:generate

      - name: Run tests with coverage
        working-directory: oauth-service-ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/oauth_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
          JWT_PUBLIC_KEY: |
